<form id="create-news-form" enctype="multipart/form-data">
    <input type="text" name="title" placeholder="Заголовок" required><br><br>
    <textarea name="intro" placeholder="Короткое описание" required></textarea><br><br>
    <textarea name="text" placeholder="Текст новости" required></textarea><br><br>
    <label>Картинка анонса:</label>
    <input type="file" name="preview_image"><br><br>
    <label>Доп. картинки:</label>
    <input type="file" name="images" multiple><br><br>
    <button type="submit">Создать новость</button>
</form>

<div id="create-news-result"></div>

<script>
document.getElementById('create-news-form').addEventListener('submit', function(e){
    e.preventDefault(); // предотвращаем стандартную отправку

    const formData = new FormData(this);

    fetch('/katy-mode/create-news', {   // обязательно указываем правильный URL
        method: 'POST',
        body: formData,
        headers: {'X-Requested-With': 'XMLHttpRequest'}
    })
    .then(res => res.text())
    .then(msg => {
        document.getElementById('create-news-result').innerHTML = `<p style="color:green;">${msg}</p>`;
        this.reset();
        console.log("Новость успешно создана!");
    })
    .catch(err => {
        document.getElementById('create-news-result').innerHTML = `<p style="color:red;">Ошибка: ${err}</p>`;
        console.error(err);
    });
});
</script>
